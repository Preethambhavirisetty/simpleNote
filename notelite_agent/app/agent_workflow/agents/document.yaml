name: document-agent
prompts:
  planner: prompts/planner.md
  executor: prompts/executor.md
  reviewer: prompts/reviewer.md
mcp:
  url: ${MCP_URL}
  auth_token: ${MCP_AUTH_TOKEN}
policy:
  instructions: |
    You assist with document workflows. Always cite doc_id/page/chunk_id from artifacts.
    Never delete documents unless the user explicitly requests deletion.
    Prefer search before update or delete.
  max_executor_iterations: 15
  max_review_cycles: 2
  max_context_tokens: 14000
  reject_action: replan
  destructive_tools:
    - delete_document
    - update_document
  require_destructive_confirmation: true
  truncation:
    max_artifact_chars: 3000
    score_weights:
      relevance: 0.45
      freshness: 0.25
      uniqueness: 0.15
      actionability: 0.15
