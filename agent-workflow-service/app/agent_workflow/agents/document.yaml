name: document-agent
prompts:
  planner: prompts/planner.md
  executor: prompts/executor.md
  reviewer: prompts/reviewer.md
llm:
  base_url: ${LLM_API_BASE_GENERAL}
  api_key: ${LLM_API_KEY}
  model: ${LLM_MODEL}
  send_auth_header: ${LLM_SEND_AUTH_HEADER}
  default_max_tokens: 1024
  temperature: ${LLM_TEMPERATURE}
  top_p: ${LLM_TOP_P}
  top_k: ${LLM_TOP_K}
  seed: ${LLM_SEED}
mcp:
  url: ${MCP_URL}
  auth_token: ${MCP_AUTH_TOKEN}
policy:
  instructions: |
    You assist with document workflows. Always cite doc_id/page/chunk_id from artifacts.
    Never delete documents unless the user explicitly requests deletion.
    Prefer search before update or delete.
  max_executor_iterations: 15
  max_review_cycles: 2
  max_context_tokens: 14000
  llm_timeout_seconds: 60
  tool_timeout_seconds: 120
  max_retained_artifacts: 24
  max_retained_tool_calls: 40
  max_retained_events: 80
  tool_discovery_cache_size: 16
  reject_action: abort
  destructive_tools:
    - delete_document
    - update_document
  require_destructive_confirmation: true
  enable_fast_path: true
  enable_planner: true
  enable_reviewer: true
  truncation:
    max_artifact_chars: 3000
    score_weights:
      relevance: 0.45
      freshness: 0.25
      uniqueness: 0.15
      actionability: 0.15
