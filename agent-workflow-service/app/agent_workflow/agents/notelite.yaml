name: notelite-agent
prompts:
  planner: prompts/planner.md
  executor: prompts/executor.md
  reviewer: prompts/reviewer.md
llm:
  base_url: ${LLM_API_BASE}
  api_key: ${LLM_API_KEY}
  model: ${LLM_REASONER_MODEL}
  send_auth_header: ${LLM_SEND_AUTH_HEADER}
  default_max_tokens: 2048
  temperature: ${LLM_TEMPERATURE}
  top_p: ${LLM_TOP_P}
  top_k: ${LLM_TOP_K}
  seed: ${LLM_SEED}
mcp:
  url: ${MCP_URL}
  auth_token: ${MCP_AUTH_TOKEN}
policy:
  instructions: |
    You assist users with their Notelite workspace. Use the read-only note tools
    for note-grounded questions and cite note titles or ids from tool artifacts
    when answering from workspace content.
  max_executor_iterations: 10
  max_review_cycles: 2
  max_tool_calls_per_step: 3
  max_context_tokens: 12000
  llm_timeout_seconds: 60
  tool_timeout_seconds: 120
  max_retained_artifacts: 20
  max_retained_tool_calls: 32
  max_retained_events: 80
  reject_action: replan
  destructive_tools:
    - delete_note
    - update_note
  require_destructive_confirmation: true
  enable_fast_path: true
  enable_planner: false
  enable_reviewer: true
  render_final_answer: true
  enforce_grounding: true
  tools:
    allowlist:
      - search_notes
      - locate_notes
      - summarize_notes
      - list_notes
      - list_folders
    argument_injection:
      search_notes:
        user_id: user_id
        history: history
      locate_notes:
        user_id: user_id
        history: history
      summarize_notes:
        user_id: user_id
      list_notes:
        user_id: user_id
      list_folders:
        user_id: user_id
  planner:
    enabled: false
  reviewer:
    enabled: true
    mode: always
    max_cycles: 2
  truncation:
    max_artifact_chars: 2500
    score_weights:
      relevance: 0.45
      freshness: 0.25
      uniqueness: 0.15
      actionability: 0.15
resources:
  checkpointer:
    mode: ${AGENT_WORKFLOW_CHECKPOINTER}
    url: ${AGENT_WORKFLOW_REDIS_URL}
