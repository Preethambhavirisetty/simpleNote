# Quick read exploration preset — merged onto default.yaml per request.
policy:
  enable_fast_path: true
  enable_planner: true
  max_executor_iterations: 10
  max_review_cycles: 1
  max_explore_cycles: 0
  max_tool_calls_per_step: 3
  enable_running_summary: false
  reviewer:
    enabled: true
    mode: on_risk
    max_cycles: 1
  revision:
    max_cycles: 1
  # Full-content answers even in quick mode: don't cut a complete reply short.
  executor:
    synthesize_max_tokens: 6000
  finalizer:
    max_tokens: 4000
  context:
    max_artifacts_in_prompt: 20
  truncation:
    max_artifact_chars: 30000
    max_string_field_chars: 12000
    max_fact_chars: 10000
    max_list_rows_visible: 300
