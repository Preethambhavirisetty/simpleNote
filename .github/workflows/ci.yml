name: CI

# Runs on every push to main/develop and on every pull-request that targets
# those branches.  The "test" job is configured as a required status check in
# GitHub branch-protection rules, so a PR can only be merged when it passes.
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel any in-progress run for the same branch/PR so we don't waste minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Lint ────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install ruff
        run: pip install ruff --quiet

      - name: Run ruff
        run: ruff check app/ tests/

  # ── 2. Tests ───────────────────────────────────────────────────────────────
  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    # All external dependencies (Postgres, etc.) are mocked inside the test
    # suite, so no service containers are required.
    defaults:
      run:
        working-directory: backend

    # Env vars that config.py requires at import time.
    # They point at nothing real; every DB call is mocked in tests.
    env:
      POSTGRES_DB_URL: postgresql+psycopg://ci:ci@localhost:5432/ci_db
      SECRET_KEY: ci-secret-key-not-used-in-tests
      HASH_ALGORITHM: HS256

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short --strict-markers

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: backend/.pytest_cache/
          retention-days: 7

  # ── 3. Docker build (dry-run) ──────────────────────────────────────────────
  docker-build:
    name: Docker build check
    runs-on: ubuntu-latest
    # Only verify the image builds; we don't push from feature branches.
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: false
          tags: notelite-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 4. Push to registry (main branch only) ────────────────────────────────
  docker-push:
    name: Push image to GHCR
    runs-on: ubuntu-latest
    # Only publish after the full test + build chain succeeds, and only on
    # direct pushes to main (not on PRs).
    needs: [test, docker-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write   # needed to push to ghcr.io

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/backend
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
