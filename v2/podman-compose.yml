# notelite v2 — full-stack compose
#
# Usage:
#   podman-compose up -d               # start everything
#   podman-compose logs -f backend     # tail logs for one service
#   podman-compose down                # stop and remove containers
#
# Inference: run natively on the host (uses Metal, loads models in ~30s):
#   cd notelite_inference/build && ./inference_api
#
# Frontend: run on the host (Vite HMR doesn't work well in containers):
#   cd frontend && npm install && npm run dev
#
# NOTE: depends_on is intentionally omitted — podman-compose blocks forever
# waiting for service_started/service_healthy conditions. Services use
# restart: unless-stopped to recover if a dependency isn't ready yet.
#
# Secrets come from the root .env file (same directory as this file).

x-redis-url: &redis-url "redis://:${REDIS_PASSWORD}@redis:6379/0"
x-pg-url:    &pg-url    "postgresql+psycopg://postgres:${POSTGRES_PASSWORD}@postgres:5432/notelite"

networks:
  notelite-net:
    driver: bridge

volumes:
  postgres-data:
  qdrant-data:

services:

  # ── Infrastructure ───────────────────────────────────────────────────────────

  redis:
    image: redis:7-alpine
    container_name: myredis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    ports:
      - "6379:6379"
    networks:
      - notelite-net

  postgres:
    image: postgres:16
    container_name: mypostgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: notelite
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - notelite-net

  qdrant:
    image: qdrant/qdrant:latest
    container_name: nl-qdrant
    restart: unless-stopped
    volumes:
      - qdrant-data:/qdrant/storage
    ports:
      - "6333:6333"
    networks:
      - notelite-net

  # ── Backend (FastAPI) ────────────────────────────────────────────────────────

  backend:
    env_file:
      - ./backend/.env
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: notelite-backend
    restart: unless-stopped
    environment:
      # SECRET_KEY:             ${SECRET_KEY}
      # AGENT_API_KEY:          ${AGENT_API_KEY}
      # INGESTION_TASK_STRING:  tasks.process_ingestion
      # INGESTION_QUEUE:        ingestion
      # NOTE_SIZE_QUEUE:        note_size
      # HF_TOKEN:               ${HF_TOKEN}
      POSTGRES_DB_URL:        *pg-url
      MESSAGE_BROKER_URL:     *redis-url
      CELERY_RESULT_BACKEND:  *redis-url
      FEATURE_FLAGS_PATH:     /app/feature_flags.json
      LOKI_URL:               http://host.containers.internal:3100
    volumes:
      - ./feature_flags.json:/app/feature_flags.json:ro
    ports:
      - "3001:8000"
    networks:
      - notelite-net

  # Backend Celery worker — note_size queue
  backend-celery:
    env_file:
      - ./backend/.env
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: notelite-backend-celery
    restart: unless-stopped
    command: ["python", "-m", "celery", "-A", "app.core.celery.celery_app", "worker",
              "--loglevel=info", "-Q", "note_size", "-c", "2", "-n", "backend-celery@%h",
              "--include", "app.tasks.notes"]
    environment:
      # SECRET_KEY:             ${SECRET_KEY}
      # INGESTION_TASK_STRING:  tasks.process_ingestion
      # INGESTION_QUEUE:        ingestion
      # NOTE_SIZE_QUEUE:        note_size
      POSTGRES_DB_URL:        *pg-url
      MESSAGE_BROKER_URL:     *redis-url
      CELERY_RESULT_BACKEND:  *redis-url
    networks:
      - notelite-net

  # ── Agent (FastAPI RAG service) ──────────────────────────────────────────────

  agent:
    env_file:
      - ./notelite_agent/.env
    build:
      context: ./notelite_agent
      dockerfile: Dockerfile
    container_name: notelite-agent
    restart: unless-stopped
    environment:
      LLAMA_INDEX_CACHE_DIR:  /tmp/llama_index
      HF_HOME:                /tmp/hf_cache
      # AGENT_API_KEY:          ${AGENT_API_KEY}
      # SECRET_KEY:             ${SECRET_KEY}
      # LLM_API_KEY:            ${AGENT_API_KEY}
      # INGESTION_TASK_STRING:  tasks.process_ingestion
      # INGESTION_QUEUE:        ingestion
      # HF_TOKEN:               ${HF_TOKEN}
      LLM_API_BASE:           http://host.containers.internal:8081/v1
      LLM_MODEL:              gpt-3.5-turbo
      LLM_CONTEXT_WINDOW:     "4096"
      CHAT_LLM_API_BASE:      http://host.containers.internal:8082/v1
      QDRANT_URL:             http://qdrant:6333
      BACKEND_API_URL:        http://backend:8000
      QDRANT_COLLECTION:      knowledge
      VECTOR_DB:              qdrant
      EMBEDDING_MODEL:        BAAI/bge-large-en-v1.5
      SPARSE_EMBEDDING_MODEL: Qdrant/bm42-all-minilm-l6-v2-attentions
      EMBEDDING_DEVICE:       cpu
      RERANKER_MODEL:         cross-encoder/ms-marco-MiniLM-L-6-v2
      MAX_CHUNK_SIZE:         "450"
      CHUNK_OVERLAP:          "80"
      BREAKPOINT_PERCENTILE:  "85"
      SUPPORTED_EXTENSIONS:   ".md,.txt"
      MESSAGE_BROKER_URL:     *redis-url
      CELERY_RESULT_BACKEND:  *redis-url
      POSTGRES_DB_URL:        *pg-url
      FEATURE_FLAGS_PATH:     /app/feature_flags.json
      LOKI_URL:               http://host.containers.internal:3100
    volumes:
      - ./feature_flags.json:/app/feature_flags.json:ro
    ports:
      - "3002:8000"
    networks:
      - notelite-net

  # Agent Celery worker — ingestion + conversation queues
  agent-celery:
    env_file:
      - ./notelite_agent/.env
    build:
      context: ./notelite_agent
      dockerfile: Dockerfile
    container_name: notelite-agent-celery
    restart: unless-stopped
    command: ["python", "-m", "celery", "-A", "workers.app", "worker",
              "--loglevel=info", "-Q", "ingestion,conversation", "-c", "2", "-n", "agent-celery@%h"]
    environment:
      # AGENT_API_KEY:          ${AGENT_API_KEY}
      # SECRET_KEY:             ${SECRET_KEY}
      # LLM_API_KEY:            ${AGENT_API_KEY}
      # INGESTION_TASK_STRING:  tasks.process_ingestion
      # INGESTION_QUEUE:        ingestion
      # HF_TOKEN:               ${HF_TOKEN}
      LLAMA_INDEX_CACHE_DIR:  /tmp/llama_index
      HF_HOME:                /tmp/hf_cache
      LLM_API_BASE:           http://host.containers.internal:8081/v1
      LLM_MODEL:              gpt-3.5-turbo
      LLM_CONTEXT_WINDOW:     "4096"
      CHAT_LLM_API_BASE:      http://host.containers.internal:8082/v1
      QDRANT_URL:             http://qdrant:6333
      BACKEND_API_URL:        http://backend:8000
      QDRANT_COLLECTION:      knowledge
      VECTOR_DB:              qdrant
      EMBEDDING_MODEL:        BAAI/bge-large-en-v1.5
      SPARSE_EMBEDDING_MODEL: Qdrant/bm42-all-minilm-l6-v2-attentions
      EMBEDDING_DEVICE:       cpu
      RERANKER_MODEL:         cross-encoder/ms-marco-MiniLM-L-6-v2
      MAX_CHUNK_SIZE:         "450"
      CHUNK_OVERLAP:          "80"
      BREAKPOINT_PERCENTILE:  "85"
      SUPPORTED_EXTENSIONS:   ".md,.txt"
      MESSAGE_BROKER_URL:     *redis-url
      CELERY_RESULT_BACKEND:  *redis-url
      POSTGRES_DB_URL:        *pg-url
      FEATURE_FLAGS_PATH:     /app/feature_flags.json
      LOKI_URL:               http://host.containers.internal:3100
    volumes:
      - ./feature_flags.json:/app/feature_flags.json:ro
    networks:
      - notelite-net
