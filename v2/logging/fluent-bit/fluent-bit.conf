[SERVICE]
    Flush         5
    Daemon        Off
    Log_Level     info
    Parsers_File  /fluent-bit/etc/parsers.conf

# ── Collect all podman container logs ──────────────────────────────
[INPUT]
    Name              tail
    Tag               container.*
    Path              /var/log/containers/*.log
    Parser            docker
    DB                /var/log/flb_containers.db
    Mem_Buf_Limit     50MB
    Skip_Long_Lines   On
    Refresh_Interval  10

# ── Parse container name into a label ──────────────────────────────
[FILTER]
    Name                modify
    Match               container.*
    Condition           Key_exists  container_name

# ── Tag each service explicitly ────────────────────────────────────
[FILTER]
    Name    rewrite_tag
    Match   container.*
    Rule    $log ^.*$ container.$TAG false

# ── FastAPI logs ───────────────────────────────────────────────────
[FILTER]
    Name          grep
    Match         container.*
    Regex         $container_name fastapi

[OUTPUT]
    Name          loki
    Match         container._fastapi_
    Host          loki
    Port          3100
    Labels        job=fastapi, service=backend, instance=instance1
    Label_Keys    $level
    line_format   json

# ── RAG backend logs ───────────────────────────────────────────────
[OUTPUT]
    Name          loki
    Match         container._rag_
    Host          loki
    Port          3100
    Labels        job=rag, service=rag_backend, instance=instance1
    Label_Keys    $level
    line_format   json

# ── Qdrant logs ────────────────────────────────────────────────────
[OUTPUT]
    Name          loki
    Match         container._qdrant_
    Host          loki
    Port          3100
    Labels        job=qdrant, service=vector_db, instance=instance1
    line_format   json

# ── PostgreSQL logs ────────────────────────────────────────────────
[OUTPUT]
    Name          loki
    Match         container._postgres_
    Host          loki
    Port          3100
    Labels        job=postgres, service=database, instance=instance1
    line_format   json

# ── Catch-all for anything else ────────────────────────────────────
[OUTPUT]
    Name          loki
    Match         container.*
    Host          loki
    Port          3100
    Labels        job=other, instance=instance1
    line_format   json