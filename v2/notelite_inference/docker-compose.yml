# Two inference instances: summarization (Mistral) and chat (Llama).
# Mount model dir read-only; set LLAMA_MODEL_PATH per service.
# Optional: set API_KEY in .env to enable auth on both.
#
# Tuning (env vars):
#   LLAMA_N_CTX        – context window (default: 8192)
#   LLAMA_N_GPU_LAYERS – GPU layers to offload (default: 999 = all)
#   LLAMA_N_THREADS    – CPU threads (default: auto-detect)
#
# Usage:
#   podman compose up -d
#   podman compose logs -f summarization
#
# Model-to-purpose mapping:
#   Mistral 7B  → summarization (summaries, query parsing, question generation)
#   Llama 3.1 8B → chat (user Q&A)

services:
  summarization:
    build: .
    image: localhost/notelite-inference:latest
    container_name: inference-summary
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      SERVICE_MODE: summarization
      LLAMA_MODEL_PATH: /models/mistral_7b_instruct_v0_2_Q5_K_M.gguf
      API_KEY: ${API_KEY:-}
    volumes:
      - ./models:/models:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s
    stop_signal: SIGTERM
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 12G

  chat:
    image: localhost/notelite-inference:latest
    container_name: inference-chat
    restart: unless-stopped
    ports:
      - "8082:8081"
    environment:
      SERVICE_MODE: summarization
      LLAMA_MODEL_PATH: /models/Meta-Llama-3.1-8B-Instruct-Q5_K_M.gguf
      API_KEY: ${API_KEY:-}
    volumes:
      - ./models:/models:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s
    stop_signal: SIGTERM
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "3"
          memory: 12G
