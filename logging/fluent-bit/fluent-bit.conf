[SERVICE]
    Flush         5
    Daemon        Off
    Log_Level     info
    Parsers_File  /fluent-bit/etc/parsers.conf

# ── Collect all podman container logs ──────────────────────────────
[INPUT]
    Name              tail
    Tag               container.*
    Path              /var/log/containers/*/*.log
    Parser            docker
    DB                /var/log/flb_containers.db
    Mem_Buf_Limit     50MB
    Skip_Long_Lines   On
    Refresh_Interval  10

# ── Map container names to service labels via Lua ─────────────────
#
# Podman log paths contain the container name. The Lua script extracts
# it from the Tag (which mirrors the file path) and sets a "service"
# record field that Loki OUTPUT blocks use as a label.
[FILTER]
    Name    lua
    Match   container.*
    script  /fluent-bit/etc/set_service.lua
    call    set_service

# ── Backend (notelite-backend) ────────────────────────────────────
[OUTPUT]
    Name          loki
    Match         container.*
    Host          loki
    Port          3100
    Labels        instance=instance1
    Label_Keys    service
    line_format   json
